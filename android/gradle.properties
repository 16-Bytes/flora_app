# Habilita o daemon (reutiliza o processo do gradle)
org.gradle.daemon=true

# Habilita cache de build (reutiliza tarefas de builds anteriores)
org.gradle.caching=true

# Habilita compilação paralela de módulos (essencial para i5)
org.gradle.parallel=true

# Configurações de Memória (Ajuste para 8GB RAM)
# 2048m-3072m é o ideal para não travar o PC
org.gradle.jvmargs=-Xmx3072m -XX:MaxMetaspaceSize=512m -XX:+UseParallelGC

# Habilita cache de configuração (Melhora muito builds subsequentes)
org.gradle.configuration-cache=false

# Habilita file-system watching (Verifica arquivos alterados mais rápido)
org.gradle.vfs.watch=true

# Desabilita Jetifier se não for necessário (acelera a build)
android.useAndroidX=true
android.enableJetifier=true
