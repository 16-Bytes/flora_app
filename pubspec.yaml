name: flora
description: "Plataforma educacional inclusiva para suporte pedagógico de estudantes neurodivergentes, focada no ODS 4 - Educação de Qualidade."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  
  # Comunicação e Segurança
  http: ^1.6.0
  flutter_dotenv: ^6.0.1
  flutter_secure_storage: ^9.2.4

  # Persistência e Arquivos
  shared_preferences: ^2.5.5
  file_picker: ^11.0.2

  # Interface
  cupertino_icons: ^1.0.8

  # Notificações
  flutter_local_notifications: ^19.2.1
  permission_handler: ^11.3.1

  # Gráficos
  fl_chart: ^0.70.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  
  # Ferramentas
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.1

# Ícone do App
flutter_launcher_icons:
  android: true
  ios: false 
  image_path: "assets/images/logo.png"
  min_sdk_android: 21

flutter_native_splash:
  color: "#B4D4D3"
  image: "assets/images/logo.png"
  android: true
  ios: false

flutter:
  uses-material-design: true

  assets:
    - .env
    - assets/images/